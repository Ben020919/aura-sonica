# Render 部署設定（Static Site）
# 喺 Render 撳 New → Blueprint，揀呢個 repo，佢就會自動照住呢個檔設定。
services:
  - type: web
    name: aura-sonica
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # HashRouter 已經唔使 server rewrite，但保留一條 fallback 都無妨
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
# 補充：Page 6 留言想自動寄信，之後喺 Render dashboard 個 Environment
# 加返 VITE_EMAILJS_SERVICE_ID / _TEMPLATE_ID / _PUBLIC_KEY 就得（唔加就用 mailto 後備）。
